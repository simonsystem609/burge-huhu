<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Royal Game of Ur</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#2a1a10" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bürge" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Royal Game of Ur</div>
    <div class="topbar-right">
      <button id="btn-back" class="ghost">Back</button>
    </div>
  </header>

  <main id="app">
    <!-- MENU -->
    <section id="screen-menu" class="screen active">
      <div class="menu-card">
        <h1>Royal Game of Ur</h1>
        <p class="subtitle">4600-year-old Mesopotamian race game &mdash; 2 players</p>

        <button id="btn-install-app" type="button" class="ghost install-btn" data-install-app>Install App</button>

        <label class="field">
          <span>Your name</span>
          <input id="name-input" type="text" maxlength="12" placeholder="Enter your name" />
        </label>

        <label class="field">
          <span>Rules</span>
          <select id="mode-select">
            <option value="finkel" selected>Finkel &mdash; classic: 7 pieces, rosettes are safe</option>
            <option value="masters">Masters &mdash; longer path, 3 dice (0 = 4), rosettes unsafe</option>
            <option value="blitz">Blitz &mdash; 5 pieces, captures grant an extra roll</option>
          </select>
        </label>

        <label class="field inline">
          <span>Bot speed</span>
          <select id="bot-speed">
            <option value="700">Fast</option>
            <option value="1200" selected>Normal</option>
            <option value="2000">Slow</option>
          </select>
        </label>

        <div class="menu-actions">
          <button id="btn-single" class="primary">Singleplayer (vs bot)</button>
          <div class="divider"></div>
          <button id="btn-create">Create room</button>
          <div class="join-row">
            <input id="code-input" type="text" maxlength="4" placeholder="ROOM CODE" />
            <button id="btn-join">Join</button>
          </div>
          <div class="divider"></div>
          <button id="btn-goto-cards" type="button" style="width:100%;background:#222;border-color:#444;color:#ccc">Bürge · Hühü (card game)</button>
        </div>
      </div>
    </section>

    <!-- LOBBY -->
    <section id="screen-lobby" class="screen">
      <div class="menu-card">
        <h2>Lobby</h2>
        <div class="code-box">
          <span>Code</span>
          <strong id="lobby-code">----</strong>
          <button id="btn-copy" class="ghost small">Copy</button>
        </div>
        <p id="lobby-mode" class="hint"></p>
        <ul id="seat-list" class="seat-list"></ul>
        <div class="lobby-actions">
          <button id="btn-start" class="primary">Start game</button>
          <button id="btn-leave-lobby" class="ghost">Leave</button>
        </div>
        <p id="lobby-hint" class="hint"></p>
      </div>
    </section>

    <!-- GAME -->
    <section id="screen-game" class="screen">
      <div class="table-ur">
        <div class="opp-panel" id="opp-panel">
          <div class="opp-name" id="opp-name">Bot</div>
          <div class="opp-pieces">
            <span id="opp-home">&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;</span>
            <div id="opp-finished" class="finished-tray"></div>
          </div>
        </div>

        <div class="board" id="board"></div>

        <div class="dice-area">
          <button id="btn-roll" class="primary roll-btn">Roll dice</button>
          <div id="roll-result" class="roll-result"></div>
        </div>
        <div class="move-area">
          <button id="btn-bear-off" class="ghost" style="display:none">Bear off</button>
        </div>

        <div class="turn-info" id="turn-info"></div>

        <div class="my-panel">
          <div class="my-pieces">
            <span id="my-home"></span>
            <div id="my-finished" class="finished-tray"></div>
          </div>
        </div>
      </div>

      <aside class="sidelog">
        <h3>Log</h3>
        <ul id="log-list"></ul>
      </aside>
    </section>
  </main>

  <div id="overlay" class="overlay">
    <div class="overlay-card">
      <h2 id="over-title"></h2>
      <div class="overlay-actions">
        <button id="btn-rematch" class="primary">Rematch</button>
        <button id="btn-menu" class="ghost">Menu</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="move-overlay">
    <svg width="100%" height="100%">
      <defs>
        <marker id="move-arrowhead" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
          <polygon points="0,0 7,3.5 0,7" />
        </marker>
      </defs>
      <line id="move-arrow-line" marker-end="url(#move-arrowhead)" />
    </svg>
    <div id="move-phantom-piece"></div>
  </div>

  <div id="dice-anim">
    <div class="dice-row">
      <div class="die"><svg viewBox="0 0 40 40"><polygon points="20,3 37,34 3,34" /><line x1="20" y1="23" x2="20" y2="3" /><line x1="20" y1="23" x2="37" y2="34" /><line x1="20" y1="23" x2="3" y2="34" /><circle class="pip" cx="20" cy="23" r="5" /></svg></div>
      <div class="die"><svg viewBox="0 0 40 40"><polygon points="20,3 37,34 3,34" /><line x1="20" y1="23" x2="20" y2="3" /><line x1="20" y1="23" x2="37" y2="34" /><line x1="20" y1="23" x2="3" y2="34" /><circle class="pip" cx="20" cy="23" r="5" /></svg></div>
      <div class="die"><svg viewBox="0 0 40 40"><polygon points="20,3 37,34 3,34" /><line x1="20" y1="23" x2="20" y2="3" /><line x1="20" y1="23" x2="37" y2="34" /><line x1="20" y1="23" x2="3" y2="34" /><circle class="pip" cx="20" cy="23" r="5" /></svg></div>
      <div class="die"><svg viewBox="0 0 40 40"><polygon points="20,3 37,34 3,34" /><line x1="20" y1="23" x2="20" y2="3" /><line x1="20" y1="23" x2="37" y2="34" /><line x1="20" y1="23" x2="3" y2="34" /><circle class="pip" cx="20" cy="23" r="5" /></svg></div>
    </div>
    <div class="dice-total" id="dice-total"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
  <script src="/pwa-install.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
